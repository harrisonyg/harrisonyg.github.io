<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Harrison Y G — All my links in one place">

  <link rel="icon" href="https://pps.services.adobe.com/api/profile/C64A5C2858C26B220A495CC2@AdobeID/image/d48d6ef0-3831-454b-b06f-a58d0131419e/276">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #0f0f12;
      --surface: rgba(255, 255, 255, 0.06);
      --surface-hover: rgba(255, 255, 255, 0.1);
      --text: #f5f5f5;
      --text-muted: #a0a0a0;
      --accent: #7c5cff;
      --radius: 14px;
    }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.25rem 3rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124, 92, 255, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124, 92, 255, 0.08), transparent);
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
    }
    .profile {
      text-align: center;
      margin-bottom: 2rem;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--surface-hover);
      margin-bottom: 1rem;
    }
    .name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .bio {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .link-card {
      display: block;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .link-card:hover {
      background: var(--surface-hover);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }
    .link-card:active {
      transform: translateY(0);
    }
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .share-wrap {
      display: flex;
      justify-content: center;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .share-btn:hover,
    .share-btn:focus-visible {
      background: var(--surface-hover);
      color: var(--accent);
      transform: scale(1.05);
    }
    .share-btn:active {
      transform: scale(0.98);
    }
    .share-btn svg {
      width: 20px;
      height: 20px;
    }
    .share-btn.copied {
      color: var(--accent);
    }
    .qr-desktop {
      display: none;
    }
    @media (min-width: 768px) {
      .qr-desktop {
        display: block;
        position: fixed;
        right: 1.5rem;
        bottom: 1.5rem;
        z-index: 10;
      }
    }
    .qr-desktop img {
      display: block;
      width: 100px;
      height: 100px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .qr-desktop p {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* Now playing card — fixed bottom-left */
    .spotify-now {
      --album-glow: rgba(124, 92, 255, 0.35);
      position: fixed;
      left: 1.25rem;
      bottom: max(1.25rem, env(safe-area-inset-bottom, 0px));
      z-index: 1000;
      margin: 0;
      width: min(100%, 360px);
      max-width: calc(100vw - 2.5rem);
      font-size: 0.85rem;
      text-align: left;
      color: var(--text);
      animation: island-in 560ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    @keyframes island-in {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .spotify-now__inner {
      display: flex;
      align-items: flex-start;
      gap: 0.82rem;
      padding: 0.82rem;
      border-radius: 20px;
      background:
        radial-gradient(120% 160% at 10% 8%, color-mix(in srgb, var(--album-glow) 38%, transparent), transparent 52%),
        linear-gradient(140deg, rgba(12, 14, 20, 0.96), rgba(8, 10, 18, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 14px 40px rgba(0, 0, 0, 0.5),
        0 0 42px color-mix(in srgb, var(--album-glow) 55%, transparent);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
      transition: transform 220ms ease, box-shadow 260ms ease;
    }
    .spotify-now__inner:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 18px 48px rgba(0, 0, 0, 0.56),
        0 0 52px color-mix(in srgb, var(--album-glow) 65%, transparent);
    }
    .spotify-now__label {
      display: block;
      font-size: 0.66rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(235, 235, 245, 0.78);
    }
    .spotify-now__meta {
      color: rgba(195, 199, 212, 0.85);
      font-size: 0.82rem;
      line-height: 1.35;
    }
    .spotify-now__art {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.42),
        0 0 0 1px rgba(255, 255, 255, 0.09) inset;
      transition: transform 240ms ease, box-shadow 240ms ease;
    }
    .spotify-now__inner:hover .spotify-now__art {
      transform: rotate(-1.5deg) scale(1.02);
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.52),
        0 0 0 1px rgba(255, 255, 255, 0.12) inset;
    }
    .spotify-now__art--placeholder {
      background:
        linear-gradient(145deg, rgba(124, 92, 255, 0.38), rgba(77, 199, 255, 0.24)),
        rgba(255, 255, 255, 0.08);
      position: relative;
    }
    .spotify-now__art--placeholder::after {
      content: '♪';
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.72);
      font-size: 1.15rem;
      font-weight: 700;
    }
    .spotify-now__text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .spotify-now__text .spotify-now__label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: rgba(225, 230, 242, 0.84);
    }
    .spotify-now__title {
      font-weight: 700;
      font-size: 0.96rem;
      line-height: 1.2;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spotify-now__title:hover {
      color: #ffffff;
    }
    .spotify-now__artist {
      font-size: 0.78rem;
      color: rgba(170, 176, 192, 0.88);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spotify-now__pulse {
      width: 0.42rem;
      height: 0.42rem;
      border-radius: 999px;
      background: #3ddc97;
      box-shadow: 0 0 0 0 rgba(61, 220, 151, 0.6);
      animation: pulse 1.8s ease-out infinite;
      flex: 0 0 auto;
    }
    .spotify-now--playing:not(.is-playing) .spotify-now__pulse,
    .spotify-now--idle .spotify-now__pulse {
      background: rgba(152, 158, 176, 0.82);
      animation: none;
      box-shadow: none;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(61, 220, 151, 0.6); }
      70% { box-shadow: 0 0 0 10px rgba(61, 220, 151, 0); }
      100% { box-shadow: 0 0 0 0 rgba(61, 220, 151, 0); }
    }
    @media (max-width: 480px) {
      .spotify-now {
        width: calc(100vw - 2.5rem);
      }
      .spotify-now__inner {
        border-radius: 18px;
      }
      .spotify-now__art {
        width: 56px;
        height: 56px;
      }
      .spotify-now__title {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

  <script>
    (function () {
      var btn = document.getElementById('shareBtn');
      var url = window.location.href;
      var title = document.title;

      function copyLink() {
        navigator.clipboard.writeText(url).then(function () {
          btn.classList.add('copied');
          btn.setAttribute('aria-label', 'Link copied!');
          setTimeout(function () {
            btn.classList.remove('copied');
            btn.setAttribute('aria-label', 'Share this page');
          }, 2000);
        });
      }

      btn.addEventListener('click', function () {
        if (navigator.share) {
          navigator.share({ title: title, url: url })
            .then(function () {})
            .catch(function () { copyLink(); });
        } else {
          copyLink();
        }
      });
    })();
  </script>
  <script type="module" src="lastfm.js"></script>
