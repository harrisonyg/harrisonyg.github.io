<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Harrison Y G — All my links in one place">
  <title>Harrison Y G · Links</title>
  <link rel="icon" href="https://pps.services.adobe.com/api/profile/C64A5C2858C26B220A495CC2@AdobeID/image/d48d6ef0-3831-454b-b06f-a58d0131419e/276">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #0f0f12;
      --surface: rgba(255, 255, 255, 0.06);
      --surface-hover: rgba(255, 255, 255, 0.1);
      --text: #f5f5f5;
      --text-muted: #a0a0a0;
      --accent: #7c5cff;
      --radius: 14px;
    }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.25rem 3rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124, 92, 255, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124, 92, 255, 0.08), transparent);
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
    }
    .profile {
      text-align: center;
      margin-bottom: 2rem;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--surface-hover);
      margin-bottom: 1rem;
    }
    .name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .bio {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .link-card {
      display: block;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .link-card:hover {
      background: var(--surface-hover);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }
    .link-card:active {
      transform: translateY(0);
    }
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .share-wrap {
      display: flex;
      justify-content: center;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .share-btn:hover,
    .share-btn:focus-visible {
      background: var(--surface-hover);
      color: var(--accent);
      transform: scale(1.05);
    }
    .share-btn:active {
      transform: scale(0.98);
    }
    .share-btn svg {
      width: 20px;
      height: 20px;
    }
    .share-btn.copied {
      color: var(--accent);
    }
    .qr-desktop {
      display: none;
    }
    @media (min-width: 768px) {
      .qr-desktop {
        display: block;
        position: fixed;
        right: 1.5rem;
        bottom: 1.5rem;
        z-index: 10;
      }
    }
    .qr-desktop img {
      display: block;
      width: 100px;
      height: 100px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .qr-desktop p {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* Now-playing island — fixed bottom-left */
    .spotify-now {
      position: fixed;
      bottom: 1.25rem;
      left: 1.25rem;
      z-index: 1000;
      max-width: 280px;
      font-size: 0.8rem;
      text-align: left;
      color: var(--text);
      animation: island-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes island-in {
      from { opacity: 0; transform: translateY(20px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .spotify-now__inner {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
      background: rgba(20, 20, 24, 0.85);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 255, 255, 0.06) inset;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
    }
    .spotify-now__inner:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
    }
    .spotify-now__label {
      display: none;
    }
    .spotify-now--idle .spotify-now__label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 0.25rem;
    }
    .spotify-now--idle .spotify-now__inner {
      gap: 0.4rem;
    }
    .spotify-now__meta {
      color: var(--text-muted);
      font-size: 0.78rem;
    }
    .spotify-now__art {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .spotify-now__art--placeholder {
      background: rgba(255, 255, 255, 0.08);
    }
    .spotify-now__text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.08em;
    }
    .spotify-now__text .spotify-now__label {
      display: block;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      width: auto;
    }
    .spotify-now__title {
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spotify-now__title:hover {
      color: var(--accent);
    }
    .spotify-now__artist {
      font-size: 0.68rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spotify-now--playing.is-playing .spotify-now__art {
      animation: art-spin 4s linear infinite;
    }
    .spotify-now--playing.is-playing .spotify-now__text .spotify-now__label {
      color: #1db954;
    }
    @keyframes art-spin {
      to { transform: rotate(360deg); }
    }
    @media (max-width: 480px) {
      .spotify-now { max-width: calc(100vw - 2.5rem); }
    }
  </style>
</head>

  <script>
    (function () {
      var btn = document.getElementById('shareBtn');
      var url = window.location.href;
      var title = document.title;

      function copyLink() {
        navigator.clipboard.writeText(url).then(function () {
          btn.classList.add('copied');
          btn.setAttribute('aria-label', 'Link copied!');
          setTimeout(function () {
            btn.classList.remove('copied');
            btn.setAttribute('aria-label', 'Share this page');
          }, 2000);
        });
      }

      btn.addEventListener('click', function () {
        if (navigator.share) {
          navigator.share({ title: title, url: url })
            .then(function () {})
            .catch(function () { copyLink(); });
        } else {
          copyLink();
        }
      });
    })();
  </script>
  <div id="spotify-widget" class="spotify-now" data-lastfm-user="harrisonyg" data-lastfm-key="9085ca56581ec49fdc0de349fbec265f" aria-live="polite"></div>
